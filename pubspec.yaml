name: handy_bit
description: A home services booking app.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.0.0    # <-- REQUIRED for profile images

  # State management & service locator
  provider: ^6.1.2
  get_it: ^7.7.0               # <-- REQUIRED for your locator.dart

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.0.7

  # UI Libraries
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  animations: ^2.0.8
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/lottie/
